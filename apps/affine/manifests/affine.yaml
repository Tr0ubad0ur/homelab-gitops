apiVersion: batch/v1
kind: Job
metadata:
  name: affine-migration
  namespace: affine
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: affine-migration
          image: ghcr.io/toeverything/affine:stable
          command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
          env:
            - name: REDIS_SERVER_HOST
              value: "affine-redis"
            - name: DATABASE_URL
              value: "postgresql://affine:affine@affine-postgres:5432/affine"
            - name: AFFINE_CONFIG_PATH
              value: "/root/.affine/config"
          volumeMounts:
            - name: affine-config
              mountPath: /root/.affine/config
      volumes:
        - name: affine-config
          persistentVolumeClaim:
            claimName: affine-config
---
apiVersion: v1
kind: Namespace
metadata:
  name: affine
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: affine-data
  namespace: affine
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: affine-config
  namespace: affine
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
  namespace: affine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine
  template:
    metadata:
      labels:
        app: affine
    spec:
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          ports:
            - containerPort: 3010
          env:
            - name: AFFINE_CONFIG_PATH
              value: "/root/.affine/config"
            - name: REDIS_SERVER_HOST
              value: "affine-redis"
            - name: DATABASE_URL
              value: "postgresql://affine:affine@affine-postgres:5432/affine"
            - name: NODE_ENV
              value: "production"
            - name: AFFINE_SERVER_HTTPS
              value: "false"
            - name: AFFINE_SERVER_HOST
              value: "affine.lab"
            - name: AFFINE_SERVER_PORT
              value: "3010"
          volumeMounts:
            - name: affine-data
              mountPath: /root/.affine/storage
            - name: affine-config
              mountPath: /root/.affine/config
      volumes:
        - name: affine-data
          persistentVolumeClaim:
            claimName: affine-data
        - name: affine-config
          persistentVolumeClaim:
            claimName: affine-config
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: affine
  namespace: affine
spec:
  selector:
    app: affine
  ports:
    - port: 3010
      targetPort: 3010
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: affine
  namespace: affine
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca-issuer
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - affine.lab
      secretName: affine-tls
  rules:
    - host: affine.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: affine
                port:
                  number: 3010