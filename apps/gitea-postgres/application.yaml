apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tr0ubad0ur/homelab-gitops.git
    targetRevision: HEAD
    path: apps/gitea-postgres/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true